<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Terminal Simulation</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Consolas, Monaco, monospace;
      background: #111;
      color: #00ff88;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .terminal {
      width: 100%;
      max-width: 900px;
      height: 600px;
      background: #000;
      border: 2px solid #00ff88;
      border-radius: 10px;
      box-shadow: 0 0 25px rgba(0, 255, 136, 0.2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .terminal-header {
      background: #0d0d0d;
      padding: 12px 16px;
      border-bottom: 1px solid #00ff88;
      font-weight: bold;
    }

    .terminal-body {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      white-space: pre-wrap;
      line-height: 1.6;
    }

    .input-area {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-top: 1px solid #00ff88;
      background: #050505;
      gap: 10px;
    }

    .prompt {
      color: #00ff88;
      flex-shrink: 0;
    }

    input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #00ff88;
      font-family: inherit;
      font-size: 16px;
    }

    .line-user {
      color: #8cffc1;
    }

    .line-system {
      color: #00ff88;
    }

    .line-error {
      color: #ff7070;
    }

    .line-success {
      color: #7dff7d;
    }
  </style>
</head>
<body>
  <div class="terminal">
    <div class="terminal-header">Login System Terminal Simulation</div>
    <div class="terminal-body" id="output"></div>
    <div class="input-area">
      <span class="prompt">&gt;</span>
      <input type="text" id="userInput" autocomplete="off" autofocus />
    </div>
  </div>

  <script>
    const output = document.getElementById("output");
    const userInput = document.getElementById("userInput");

    let username = "admin";
    let password = "1234";

    let state = "askUsername";
    let enteredUsername = "";

    function printLine(text, className = "line-system") {
      const line = document.createElement("div");
      line.className = className;
      line.textContent = text;
      output.appendChild(line);
      output.scrollTop = output.scrollHeight;
    }

    function startProgram() {
      printLine("START");
      printLine('SET username = "admin"');
      printLine('SET password = "1234"');
      printLine("");
      printLine("Login System");
      printLine("");
      printLine("Enter username:");
    }

    function handleInput(value) {
      printLine("> " + value, "line-user");

      if (state === "askUsername") {
        enteredUsername = value;
        state = "askPassword";
        printLine("Enter password:");
      }
      else if (state === "askPassword") {
        const enteredPassword = value;

        if (enteredUsername === username && enteredPassword === password) {
          printLine("Login successful", "line-success");
          printLine("Welcome to the system", "line-success");
          printLine("Do you want to change your password?");
          printLine("1. Yes");
          printLine("2. No");
          printLine("Enter choice:");
          state = "askChoice";
        } else {
          printLine("Login failed", "line-error");
          printLine("");
          printLine("Enter username:");
          state = "askUsername";
        }
      }
      else if (state === "askChoice") {
        if (value === "1") {
          printLine("Enter new password:");
          state = "askNewPassword";
        } else {
          printLine("Password remains the same");
          printLine("END");
          state = "ended";
          userInput.disabled = true;
          userInput.placeholder = "Program ended";
        }
      }
      else if (state === "askNewPassword") {
        password = value;
        printLine("Password changed successfully", "line-success");
        printLine("Please login again");
        printLine("");
        printLine("Enter username:");
        state = "askUsername";
      }
    }

    userInput.addEventListener("keydown", function(event) {
      if (event.key === "Enter" && state !== "ended") {
        const value = userInput.value.trim();
        if (value === "") return;
        handleInput(value);
        userInput.value = "";
      }
    });

    startProgram();
  </script>
</body>
</html>
